name: Deploy Preview Pages

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: preview-pages-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --base /planit/pr-${{ github.event.pull_request.number }}/

      - name: Prepare preview files
        run: |
          PREVIEW_DIR="planit/pr-${{ github.event.pull_request.number }}"
          rm -rf "$PREVIEW_DIR"
          mkdir -p "$PREVIEW_DIR"
          cp -R dist/. "$PREVIEW_DIR"

      - name: Deploy preview to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: planit/pr-${{ github.event.pull_request.number }}
          target-folder: planit/pr-${{ github.event.pull_request.number }}
          clean: false
          single-commit: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `https://tom.selfin.io/planit/pr-${context.issue.number}/`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔍 Preview deployed: ${previewUrl}`,
            });
